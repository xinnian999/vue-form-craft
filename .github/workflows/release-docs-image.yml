name: Release Docs Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'docs/**'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'releaseDocs.js'
      - '.github/workflows/release-docs-image.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: crpi-a7p27yxlrmekg1a3.cn-beijing.personal.cr.aliyuncs.com
  IMAGE_REPO: crpi-a7p27yxlrmekg1a3.cn-beijing.personal.cr.aliyuncs.com/elin/vue-form-craft

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
